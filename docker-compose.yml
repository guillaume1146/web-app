services:
  db:
    image: postgres:16-alpine
    container_name: mediwyz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediwyz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediwyz_secret}
      POSTGRES_DB: mediwyz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediwyz"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: mediwyz-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3000}
    container_name: mediwyz-app
    restart: always
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/auth/me').then(r=>{process.exit(r.ok||r.status===401?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  uploads:
