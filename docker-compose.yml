services:
  db:
    image: postgres:16-alpine
    container_name: mediwyz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediwyz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediwyz_secret}
      POSTGRES_DB: mediwyz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediwyz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend API ─────────────────────────────────────────────────
  api:
    image: mediwyz-api:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mediwyz-api
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://mediwyz:${POSTGRES_PASSWORD:-mediwyz_secret}@db:5432/mediwyz}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Next.js Frontend (with server.js for backward compatibility) ───────
  app:
    image: mediwyz-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
    container_name: mediwyz-app
    restart: always
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      API_INTERNAL_URL: http://api:3001
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080').then(r=>{process.exit(r.ok||r.status===401?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  uploads:
