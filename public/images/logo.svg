<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C6780"/>
      <stop offset="100%" stop-color="#9AE1FF"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#9AE1FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0C6780"/>
      <stop offset="100%" stop-color="#9AE1FF" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Letter M -->
  <path d="M120 280 L120 160 L170 230 L200 180 L230 230 L280 160 L280 280 L255 280 L255 210 L230 250 L200 200 L170 250 L145 210 L145 280 Z"
        fill="#FFFFFF" stroke="none"/>

  <!-- Heartbeat/Pulse line extending from M -->
  <polyline points="60,220 80,220 90,200 100,240 110,210 120,220"
            fill="none" stroke="url(#pulseGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leaf shape (upper right) -->
  <path d="M270 100 C270 100 320 80 330 120 C340 160 300 170 280 160 C260 150 250 110 270 100 Z"
        fill="url(#leafGrad)" stroke="none"/>

  <!-- Plus/Cross inside leaf -->
  <rect x="292" y="120" width="16" height="4" rx="2" fill="#FFFFFF"/>
  <rect x="298" y="114" width="4" height="16" rx="2" fill="#FFFFFF"/>

  <!-- MEDIWYZ text -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="36" font-weight="700" letter-spacing="4" fill="#0C6780">MEDIWYZ</text>
</svg>
