name: Migrate VPS — nginx → Caddy

# Run this ONCE after the current nginx+certbot setup is confirmed working.
# After this workflow succeeds, every subsequent deploy uses Caddy automatically.
on:
  workflow_dispatch:

jobs:
  migrate:
    name: Install Caddy + switch from nginx
    runs-on: [self-hosted, mediwyz]
    steps:
      - name: Install Caddy (official apt repo)
        run: |
          if command -v caddy >/dev/null 2>&1; then
            echo "Caddy already installed: $(caddy version)"
            exit 0
          fi
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
            | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
            | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install -y caddy
          caddy version

      - name: Write Caddy environment (APP_DOMAIN)
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          sudo mkdir -p /etc/systemd/system/caddy.service.d
          printf '[Service]\nEnvironment="APP_DOMAIN=%s"\n' "$APP_DOMAIN" \
            | sudo tee /etc/systemd/system/caddy.service.d/mediwyz.conf > /dev/null
          sudo systemctl daemon-reload
          echo "Caddy environment set: APP_DOMAIN=$APP_DOMAIN"

      - name: Deploy Caddyfile from repo
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          DOMAIN="$APP_DOMAIN"
          # Write Caddyfile with the real domain (env vars aren't in 'caddy validate')
          # No log directive — avoids /var/log/caddy/ permission issues on first start
          {
            echo "${DOMAIN}, www.${DOMAIN} {"
            echo "    reverse_proxy /socket.io/* localhost:3001"
            echo "    reverse_proxy localhost:3000"
            echo "    encode gzip"
            echo "}"
          } | sudo tee /etc/caddy/Caddyfile > /dev/null
          cat /etc/caddy/Caddyfile
          sudo caddy validate --config /etc/caddy/Caddyfile && echo "Caddyfile valid"

      - name: Stop and disable nginx
        run: |
          sudo systemctl stop nginx 2>/dev/null || true
          sudo systemctl disable nginx 2>/dev/null || true
          # Make sure port 80 is actually free
          sleep 2
          ss -tlnp | grep ':80 ' || echo "Port 80 is free"
          ss -tlnp | grep ':443 ' || echo "Port 443 is free"
          echo "nginx stopped and disabled"

      - name: Enable and start Caddy
        run: |
          sudo systemctl enable caddy
          sudo systemctl restart caddy || true
          sleep 8
          echo "=== Caddy status ==="
          sudo systemctl status caddy --no-pager || true
          echo ""
          echo "=== Caddy journal (last 30 lines) ==="
          sudo journalctl -u caddy --no-pager -n 30 || true

      - name: Verify HTTPS
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          echo "Waiting up to 60s for Caddy to provision the cert..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sI "https://$APP_DOMAIN" 2>/dev/null | head -1 | grep -q "200\|301\|302"; then
              echo "HTTPS is live after $((i * 5))s"
              curl -sI "https://$APP_DOMAIN" | head -5
              break
            fi
            echo "Still waiting... ($((i * 5))s)"
          done
          echo ""
          echo "=== HTTP redirect check ==="
          curl -sI "http://$APP_DOMAIN" | head -3
          echo ""
          echo "=== HTTPS check ==="
          curl -sI "https://$APP_DOMAIN" | head -3

      - name: Summary
        run: |
          echo "Migration complete."
          echo "Caddy handles HTTPS automatically going forward."
          echo "Certbot and nginx are no longer needed."
          echo ""
          echo "Subsequent deploys will call 'systemctl reload caddy' to pick up Caddyfile changes."
          caddy version
