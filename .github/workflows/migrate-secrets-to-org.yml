name: Migrate repo secrets → org level (run once)

# Run manually from Actions tab — delete this workflow after running.
# Requires ORG_ADMIN_PAT secret with scopes: admin:org, repo
on:
  workflow_dispatch:

jobs:
  migrate:
    name: Copy secrets to Mediwyz org
    runs-on: ubuntu-latest
    steps:
      - name: Set org secrets
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_PAT }}
          # All production secrets read from repo level
          S_APP_DOMAIN:            ${{ secrets.APP_DOMAIN }}
          S_DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          S_DEPLOY_DIR:            ${{ secrets.DEPLOY_DIR }}
          S_GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          S_JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          S_POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
          S_VPS_HOST:              ${{ secrets.VPS_HOST }}
          S_VPS_PASSWORD:          ${{ secrets.VPS_PASSWORD }}
          S_VPS_SSH_KEY:           ${{ secrets.VPS_SSH_KEY }}
          S_VPS_USER:              ${{ secrets.VPS_USER }}
          S_SUPER_ADMIN_EMAIL:     ${{ secrets.SUPER_ADMIN_EMAIL }}
          S_SUPER_ADMIN_PASSWORD:  ${{ secrets.SUPER_ADMIN_PASSWORD }}
          S_SUPER_ADMIN_FIRST_NAME: ${{ secrets.SUPER_ADMIN_FIRST_NAME }}
          S_SUPER_ADMIN_LAST_NAME:  ${{ secrets.SUPER_ADMIN_LAST_NAME }}
        run: |
          set -e
          ORG=Mediwyz
          REPO=platform

          push() {
            local name=$1
            local value=$2
            echo "Setting $name..."
            echo "$value" | gh secret set "$name" \
              --org "$ORG" \
              --repos "$REPO" \
              --body -
          }

          push APP_DOMAIN             "$S_APP_DOMAIN"
          push DATABASE_URL           "$S_DATABASE_URL"
          push DEPLOY_DIR             "$S_DEPLOY_DIR"
          push GROQ_API_KEY           "$S_GROQ_API_KEY"
          push JWT_SECRET             "$S_JWT_SECRET"
          push POSTGRES_PASSWORD      "$S_POSTGRES_PASSWORD"
          push VPS_HOST               "$S_VPS_HOST"
          push VPS_PASSWORD           "$S_VPS_PASSWORD"
          push VPS_SSH_KEY            "$S_VPS_SSH_KEY"
          push VPS_USER               "$S_VPS_USER"
          push SUPER_ADMIN_EMAIL      "$S_SUPER_ADMIN_EMAIL"
          push SUPER_ADMIN_PASSWORD   "$S_SUPER_ADMIN_PASSWORD"
          push SUPER_ADMIN_FIRST_NAME "$S_SUPER_ADMIN_FIRST_NAME"
          push SUPER_ADMIN_LAST_NAME  "$S_SUPER_ADMIN_LAST_NAME"

          echo "✅ All secrets copied to org level."
          echo "Next steps:"
          echo "  1. Verify at https://github.com/organizations/Mediwyz/settings/secrets/actions"
          echo "  2. Delete this workflow file and the ORG_ADMIN_PAT secret"
