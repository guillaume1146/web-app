name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check (frontend)
        run: npx tsc --noEmit

      - name: Type check (backend)
        run: cd backend && npm ci && npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings=0 || true

  # ─── Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run --exclude='__tests__/**'

  # ─── Build Docker Images (parallel) ──────────────────────────────────────
  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag and app URL
        id: meta
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          DOMAIN="${{ secrets.APP_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            APP_URL="https://$DOMAIN"
          else
            APP_URL="http://${{ secrets.VPS_HOST }}"
          fi
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "app_url=$APP_URL"     >> $GITHUB_OUTPUT

      - name: Build and push Next.js image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${{ steps.meta.outputs.app_url }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=${{ steps.meta.outputs.app_url }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.app_url }} \
            -t ${{ steps.meta.outputs.image_tag }} \
            -f Dockerfile \
            .
          docker push ${{ steps.meta.outputs.image_tag }}

  build-backend:
    name: Build Backend (NestJS)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push NestJS image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_tag }} \
            -f backend/Dockerfile \
            .
          docker push ${{ steps.meta.outputs.image_tag }}

  # ─── Deploy to Hostinger VPS ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, mediwyz]
    needs: [build-frontend, build-backend]
    steps:
      - name: Deploy on VPS
        run: |
          set -e
          DEPLOY_DIR="${{ secrets.DEPLOY_DIR || 'healthtech-app' }}"
          cd /root/$DEPLOY_DIR

          # Pull latest code (docker-compose.yml, prisma schema, seeds)
          git pull origin main 2>/dev/null || true

          # ── Write .env from GitHub Secrets ────────────────────────────────
          echo "Writing .env..."
          cat > .env <<ENVEOF
          DATABASE_URL=$DB_URL
          GROQ_API_KEY=$GROQ_API_KEY
          JWT_SECRET=$JWT_SECRET
          PORT=3000
          API_PORT=3001
          NODE_ENV=production
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          NEXT_PUBLIC_SOCKET_URL=$APP_URL
          NEXT_PUBLIC_APP_URL=$APP_URL
          NEXT_PUBLIC_API_URL=$APP_URL
          API_INTERNAL_URL=http://api:3001
          CORS_ALLOWED_ORIGINS=$APP_URL
          SUPER_ADMIN_EMAIL=$SUPER_ADMIN_EMAIL
          SUPER_ADMIN_PASSWORD=$SUPER_ADMIN_PASSWORD
          SUPER_ADMIN_FIRST_NAME=$SUPER_ADMIN_FIRST_NAME
          SUPER_ADMIN_LAST_NAME=$SUPER_ADMIN_LAST_NAME
          APP_DOMAIN=$APP_DOMAIN
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env
          echo ".env written ($(wc -l < .env) vars)"

          # ── Clean up legacy container names (one-time) ────────────────────
          docker stop healthwyz-app healthwyz-db omd-app omd-db 2>/dev/null || true
          docker rm  healthwyz-app healthwyz-db omd-app omd-db 2>/dev/null || true

          # ── Free disk space ───────────────────────────────────────────────
          echo "=== Freeing disk space ==="
          docker image prune -af --filter "until=24h" 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true
          journalctl --vacuum-size=50M 2>/dev/null || true
          rm -rf /tmp/* 2>/dev/null || true
          echo "Disk after cleanup: $(df -h / | tail -1 | awk '{print $5}')"

          # ── Pull both new images ──────────────────────────────────────────
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
          docker pull "$FRONTEND_IMAGE"
          docker pull "$BACKEND_IMAGE"

          # Tag images so docker-compose can use them by name
          docker tag "$FRONTEND_IMAGE" mediwyz-app:latest
          docker tag "$BACKEND_IMAGE"  mediwyz-api:latest

          # ── Start services in dependency order: db → api → app ────────────
          echo "=== Starting database ==="
          docker compose up -d db
          echo "Waiting for DB to be healthy..."
          for i in $(seq 1 12); do
            sleep 5
            if docker compose exec -T db pg_isready -U mediwyz > /dev/null 2>&1; then
              echo "DB ready after $((i * 5))s"
              break
            fi
            echo "Still waiting for DB... ($((i * 5))s)"
          done

          echo "=== Starting API (NestJS) ==="
          docker compose up -d --no-build --force-recreate api

          echo "Waiting for API to be healthy..."
          API_READY=false
          for i in $(seq 1 24); do
            sleep 5
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "API ready after $((i * 5))s"
              API_READY=true
              break
            fi
            echo "Still waiting for API... ($((i * 5))s)"
          done
          if [ "$API_READY" = "false" ]; then
            echo "=== API FAILED TO START — logs ==="
            docker compose logs --tail=60 api || true
            exit 1
          fi

          echo "=== Starting Frontend (Next.js) ==="
          docker compose up -d --no-build --force-recreate app

          echo "Waiting for frontend to be healthy..."
          APP_READY=false
          for i in $(seq 1 24); do
            sleep 5
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready after $((i * 5))s"
              APP_READY=true
              break
            fi
            echo "Still waiting for frontend... ($((i * 5))s)"
          done
          if [ "$APP_READY" = "false" ]; then
            echo "=== FRONTEND FAILED TO START — logs ==="
            docker compose logs --tail=60 app || true
            exit 1
          fi

          # ── Migrations & seed run in the app container ───────────────────
          # (app has full node_modules incl. ts-node; api is production-only)
          echo "=== Running manual SQL migrations ==="
          for sql_file in prisma/migrations/manual/*.sql; do
            if [ -f "$sql_file" ]; then
              echo "Running: $sql_file"
              docker compose exec -T app npx prisma db execute \
                --file "$sql_file" \
                --schema prisma/schema.prisma 2>&1 \
              || echo "WARNING: $sql_file may have already been applied"
            fi
          done

          echo "=== Pushing schema changes ==="
          docker compose exec -T app npx prisma db push \
            --accept-data-loss 2>&1 \
          || echo "WARNING: prisma db push failed"

          echo "=== Seeding database ==="
          docker compose exec -T app sh -c "
            npx ts-node \
              --skipProject \
              --transpile-only \
              --compiler-options '{\"module\":\"CommonJS\",\"moduleResolution\":\"node\",\"esModuleInterop\":true}' \
              prisma/seed.ts 2>&1
          " || echo "WARNING: Seed exited non-zero (may be partial or already seeded)"

          # ── Restart both after seed to clear stale connections ────────────
          echo "=== Restarting API + Frontend after seed ==="
          docker compose restart api
          sleep 10
          docker compose restart app
          sleep 15

          # ── Ensure uploads volume is writable ────────────────────────────
          docker compose exec -T -u root app \
            sh -c "mkdir -p /app/public/uploads && chown -R nextjs:nodejs /app/public/uploads" \
          || true

          # ── Verify env vars loaded ────────────────────────────────────────
          echo "=== Verifying API container env ==="
          docker compose exec -T api sh -c 'echo "DB_URL set:   $([ -n "$DATABASE_URL" ] && echo YES || echo NO)"'
          docker compose exec -T api sh -c 'echo "JWT_SECRET:   $([ -n "$JWT_SECRET"    ] && echo YES || echo NO)"'
          docker compose exec -T api sh -c 'echo "GROQ_KEY:     $([ -n "$GROQ_API_KEY"  ] && echo YES || echo NO)"'

          # ── Smoke test: login through the full stack ──────────────────────
          echo "=== Smoke test: login via Next.js proxy → NestJS ==="
          LOGIN=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"emma.johnson@mediwyz.com","password":"Patient123!"}')
          echo "Login result: $LOGIN"
          echo "$LOGIN" | grep -q '"success":true' \
            && echo "SMOKE TEST PASSED" \
            || echo "WARNING: Smoke test failed — check NestJS logs"

          # ── Configure nginx for mediwyz.com (if nginx is installed) ─────────
          if command -v nginx >/dev/null 2>&1 && [ -n "$APP_DOMAIN" ]; then
            echo "=== Configuring nginx for $APP_DOMAIN ==="
            cat > /etc/nginx/sites-available/mediwyz <<NGINXEOF
server {
    listen 80;
    listen [::]:80;
    server_name $APP_DOMAIN www.$APP_DOMAIN;

    # ACME challenge for SSL cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect HTTP → HTTPS when cert exists
    location / {
        return 301 https://\$host\$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name $APP_DOMAIN www.$APP_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$APP_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_cache_bypass \$http_upgrade;
        client_max_body_size 50M;
    }

    # WebSocket for Socket.IO (NestJS)
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
    }
}
NGINXEOF
            ln -sf /etc/nginx/sites-available/mediwyz /etc/nginx/sites-enabled/mediwyz
            rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            if nginx -t 2>/dev/null; then
              systemctl reload nginx && echo "nginx reloaded for $APP_DOMAIN"
            else
              echo "WARNING: nginx config test failed — skipping reload"
            fi

            # Get SSL cert if certbot is available and cert does not yet exist
            if command -v certbot >/dev/null 2>&1; then
              if [ ! -f "/etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem" ]; then
                echo "=== Requesting SSL certificate for $APP_DOMAIN ==="
                certbot certonly --webroot -w /var/www/html \
                  -d "$APP_DOMAIN" -d "www.$APP_DOMAIN" \
                  --non-interactive --agree-tos \
                  -m "${SUPER_ADMIN_EMAIL:-admin@mediwyz.com}" 2>&1 \
                || echo "WARNING: certbot failed — app accessible on HTTP only"
              else
                echo "SSL cert already exists for $APP_DOMAIN"
              fi
              # Make nginx serve HTTPS after cert
              nginx -t 2>/dev/null && systemctl reload nginx || true
            fi
          else
            echo "nginx not found or APP_DOMAIN not set — skipping nginx config"
          fi

          # ── Final cleanup ─────────────────────────────────────────────────
          docker image prune -f 2>/dev/null || true
          echo "=== Deployment complete ==="

        env:
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR:            ${{ github.actor }}
          FRONTEND_IMAGE:      ${{ needs.build-frontend.outputs.image_tag }}
          BACKEND_IMAGE:       ${{ needs.build-backend.outputs.image_tag }}
          APP_URL:             ${{ secrets.APP_DOMAIN != '' && format('https://{0}', secrets.APP_DOMAIN) || format('http://{0}', secrets.VPS_HOST) }}
          DB_URL:              ${{ secrets.DATABASE_URL || format('postgresql://mediwyz:{0}@db:5432/mediwyz', secrets.POSTGRES_PASSWORD) }}
          JWT_SECRET:          ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          POSTGRES_PASSWORD:   ${{ secrets.POSTGRES_PASSWORD }}
          SUPER_ADMIN_EMAIL:   ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          SUPER_ADMIN_FIRST_NAME: ${{ secrets.SUPER_ADMIN_FIRST_NAME }}
          SUPER_ADMIN_LAST_NAME:  ${{ secrets.SUPER_ADMIN_LAST_NAME }}
          DEPLOY_DIR:          ${{ secrets.DEPLOY_DIR }}
          APP_DOMAIN:          ${{ secrets.APP_DOMAIN }}

      - name: Verify deployment
        run: |
          echo "=== Container Status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep mediwyz || true

          echo ""
          echo "=== Health Checks ==="
          curl -s http://localhost:3001/api/health \
            && echo "API:      healthy" \
            || echo "API:      NOT RESPONDING"

          if curl -sk https://${{ secrets.APP_DOMAIN }}/ > /dev/null 2>&1; then
            echo "Frontend: healthy (HTTPS)"
          elif curl -s http://localhost:3000 > /dev/null 2>&1; then
            echo "Frontend: healthy (HTTP)"
          else
            echo "Frontend: NOT RESPONDING"
          fi

          echo ""
          echo "=== Resource Usage ==="
          free -h | grep Mem
          df -h / | tail -1
