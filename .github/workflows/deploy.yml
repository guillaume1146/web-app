name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  # ─── Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run --exclude='__tests__/**'

  # ─── Build Docker Image ──────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          DOMAIN="${{ secrets.APP_DOMAIN || secrets.VULTR_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            APP_URL="https://$DOMAIN"
          else
            APP_URL="http://${{ secrets.VPS_HOST || secrets.VULTR_VM_IP }}"
          fi
          docker build -t $IMAGE_TAG \
            --build-arg NEXT_PUBLIC_APP_URL=$APP_URL \
            --build-arg NEXT_PUBLIC_SOCKET_URL=$APP_URL \
            .
          docker push $IMAGE_TAG
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─── Deploy to VPS (self-hosted runner — no SSH needed) ───────────
  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, mediwyz]
    needs: build
    steps:
      - name: Deploy on VPS
        run: |
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR || 'healthtech-app' }}"
            cd /root/$DEPLOY_DIR

            # Pull latest code (for docker-compose.yml, prisma, seeds, etc.)
            git pull origin main 2>/dev/null || true

            # ── Generate .env from GitHub Secrets ──────────────────────────
            echo "Writing .env from CI/CD secrets..."
            cat > .env <<ENVEOF
            DATABASE_URL=$DB_URL
            GROQ_API_KEY=$GROQ_API_KEY
            NEXT_PUBLIC_SOCKET_URL=$APP_URL
            NEXT_PUBLIC_APP_URL=$APP_URL
            JWT_SECRET=$JWT_SECRET
            PORT=3000
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            SUPER_ADMIN_EMAIL=$SUPER_ADMIN_EMAIL
            SUPER_ADMIN_PASSWORD=$SUPER_ADMIN_PASSWORD
            SUPER_ADMIN_FIRST_NAME=$SUPER_ADMIN_FIRST_NAME
            SUPER_ADMIN_LAST_NAME=$SUPER_ADMIN_LAST_NAME
            APP_DOMAIN=${APP_DOMAIN:-mediwyz.com}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env
            echo ".env written with $(wc -l < .env) variables"

            # Clean up legacy container names (one-time)
            docker stop healthwyz-app healthwyz-db omd-app omd-db 2>/dev/null || true
            docker rm healthwyz-app healthwyz-db omd-app omd-db 2>/dev/null || true

            # Login to GHCR and pull the new image
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"

            # Tag as mediwyz-app:latest for docker-compose
            docker tag "$IMAGE_TAG" mediwyz-app:latest

            # Ensure DB is running first (never stop the DB)
            docker compose up -d db
            sleep 5

            # Restart only the app container with the new image
            docker compose up -d --no-build --force-recreate app

            # Wait for app to be ready
            echo "Waiting for app to start..."
            APP_READY=false
            for i in $(seq 1 24); do
              sleep 5
              if curl -s http://localhost:3000 > /dev/null 2>&1; then
                echo "App is ready after $((i * 5)) seconds"
                APP_READY=true
                break
              fi
              echo "Still waiting... ($((i * 5))s)"
            done

            if [ "$APP_READY" = "false" ]; then
              echo "=== APP FAILED TO START — Container logs ==="
              docker compose logs --tail=50 app 2>&1 || true
              echo "=== Container status ==="
              docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>&1 || true
            fi

            # Run manual migrations before prisma db push (handles column additions on existing tables)
            echo "=== Running manual SQL migrations ==="
            for sql_file in prisma/migrations/manual/*.sql; do
              if [ -f "$sql_file" ]; then
                echo "Running: $sql_file"
                docker compose exec -T app npx prisma db execute --file "$sql_file" --schema prisma/schema.prisma 2>&1 || echo "WARNING: $sql_file may have already been applied"
              fi
            done

            # Always sync schema with code
            echo "=== Pushing schema changes ==="
            docker compose exec -T app npx prisma db push --accept-data-loss

            # Ensure uploads directory exists and is writable inside the volume
            docker compose exec -T -u root app sh -c "mkdir -p /app/public/uploads && chown -R nextjs:nodejs /app/public/uploads" || true

            # Always seed — keeps deployed DB in sync with code
            echo "=== Seeding database ==="
            docker compose exec -T app sh -c "npx ts-node --skipProject --transpile-only --compiler-options '{\"module\":\"CommonJS\",\"moduleResolution\":\"node\",\"esModuleInterop\":true}' prisma/seed.ts 2>&1" || echo "WARNING: Seed exited with code $?"
            echo "Seed completed"

            # Restart app after seed to clear stale DB connections
            echo "Restarting app after seed..."
            docker compose restart app
            sleep 15
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "App is healthy after seed + restart"
            else
              echo "Waiting for app..."
              sleep 15
              curl -s http://localhost:3000 > /dev/null 2>&1 && echo "App is ready" || echo "App still starting"
            fi

            # Verify env vars are loaded in the container
            echo "=== Verifying container env ==="
            docker compose exec -T app sh -c 'echo "DB_URL set: $([ -n \"$DATABASE_URL\" ] && echo YES || echo NO)"'
            docker compose exec -T app sh -c 'echo "GROQ_KEY set: $([ -n \"$GROQ_API_KEY\" ] && echo YES || echo NO)"'
            docker compose exec -T app sh -c 'echo "JWT_SECRET set: $([ -n \"$JWT_SECRET\" ] && echo YES || echo NO)"'

            # Quick login test
            echo "=== Login smoke test ==="
            LOGIN_RESULT=$(curl -s http://localhost:3000/api/auth/login -X POST -H 'Content-Type: application/json' -d '{"email":"sarah.johnson@mediwyz.com","password":"Doctor123!"}')
            echo "Login result: $LOGIN_RESULT"

            # Clean up old images
            docker image prune -f 2>/dev/null || true

            echo "Deployment complete with seed data"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          APP_URL: ${{ secrets.APP_DOMAIN != '' && format('https://{0}', secrets.APP_DOMAIN) || format('http://localhost:3000') }}
          DB_URL: ${{ secrets.DATABASE_URL || format('postgresql://mediwyz:{0}@db:5432/mediwyz', secrets.POSTGRES_PASSWORD) }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          SUPER_ADMIN_FIRST_NAME: ${{ secrets.SUPER_ADMIN_FIRST_NAME }}
          SUPER_ADMIN_LAST_NAME: ${{ secrets.SUPER_ADMIN_LAST_NAME }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}

      - name: Verify deployment
        run: |
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "mediwyz" || true

            echo ""
            echo "=== Health Check ==="
            if curl -sk https://mediwyz.com/ > /dev/null 2>&1; then
              echo "App responding on HTTPS"
            elif curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "App responding on HTTP"
            else
              echo "WARNING: App not responding"
            fi

            echo ""
            echo "=== Memory Usage ==="
            free -h | head -2

            echo ""
            echo "=== Disk Usage ==="
            df -h / | tail -1
