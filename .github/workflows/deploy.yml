name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  # ─── Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run

  # ─── Build Docker Image ──────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          DOMAIN="${{ secrets.APP_DOMAIN || secrets.VULTR_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            APP_URL="https://$DOMAIN"
          else
            APP_URL="http://${{ secrets.VPS_HOST || secrets.VULTR_VM_IP }}"
          fi
          docker build -t $IMAGE_TAG \
            --build-arg NEXT_PUBLIC_APP_URL=$APP_URL \
            --build-arg NEXT_PUBLIC_SOCKET_URL=$APP_URL \
            .
          docker push $IMAGE_TAG
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─── Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          envs: GH_TOKEN,GH_ACTOR,IMAGE_TAG,APP_URL,DB_URL,JWT_SECRET,GROQ_API_KEY,POSTGRES_PASSWORD,SUPER_ADMIN_EMAIL,SUPER_ADMIN_PASSWORD,SUPER_ADMIN_FIRST_NAME,SUPER_ADMIN_LAST_NAME,DEPLOY_DIR,APP_DOMAIN
          script: |
            # Use configurable deploy directory (default: healthtech-app for backward compat)
            DEPLOY_DIR="${DEPLOY_DIR:-healthtech-app}"
            cd ~/$DEPLOY_DIR

            # Pull latest code (for docker-compose.yml, prisma, seeds, etc.)
            git pull origin main 2>/dev/null || true

            # ── Generate .env from GitHub Secrets ──────────────────────────
            echo "Writing .env from CI/CD secrets..."
            cat > .env <<ENVEOF
            DATABASE_URL=$DB_URL
            GROQ_API_KEY=$GROQ_API_KEY
            NEXT_PUBLIC_SOCKET_URL=$APP_URL
            NEXT_PUBLIC_APP_URL=$APP_URL
            JWT_SECRET=$JWT_SECRET
            PORT=3000
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            SUPER_ADMIN_EMAIL=$SUPER_ADMIN_EMAIL
            SUPER_ADMIN_PASSWORD=$SUPER_ADMIN_PASSWORD
            SUPER_ADMIN_FIRST_NAME=$SUPER_ADMIN_FIRST_NAME
            SUPER_ADMIN_LAST_NAME=$SUPER_ADMIN_LAST_NAME
            APP_DOMAIN=${APP_DOMAIN:-mediwyz.com}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env
            echo ".env written with $(wc -l < .env) variables"

            # Clean up legacy container names (one-time)
            docker stop healthwyz-app healthwyz-db omd-app omd-db 2>/dev/null || true
            docker rm healthwyz-app healthwyz-db omd-app omd-db 2>/dev/null || true

            # Login to GHCR and pull the new image
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"

            # Tag as mediwyz-app:latest for docker-compose
            docker tag "$IMAGE_TAG" mediwyz-app:latest

            # Ensure DB is running first (never stop the DB)
            docker compose up -d db
            sleep 5

            # Restart only the app container with the new image
            docker compose up -d --no-build --force-recreate app

            # Wait for app to be ready
            echo "Waiting for app to start..."
            APP_READY=false
            for i in $(seq 1 24); do
              sleep 5
              if curl -s http://localhost:3000 > /dev/null 2>&1; then
                echo "App is ready after $((i * 5)) seconds"
                APP_READY=true
                break
              fi
              echo "Still waiting... ($((i * 5))s)"
            done

            if [ "$APP_READY" = "false" ]; then
              echo "=== APP FAILED TO START — Container logs ==="
              docker compose logs --tail=50 app 2>&1 || true
              echo "=== Container status ==="
              docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>&1 || true
            fi

            # Apply schema changes
            docker compose exec -T app npx prisma db push --accept-data-loss

            # Ensure uploads directory exists and is writable inside the volume
            docker compose exec -T -u root app sh -c "mkdir -p /app/public/uploads && chown -R nextjs:nodejs /app/public/uploads" || true

            # Seed only on first deploy or when FORCE_SEED=true
            # Check if users table has data (skip seed if already populated)
            HAS_DATA=$(docker compose exec -T app sh -c "node -e \"const p=require('@prisma/client');const c=new p.PrismaClient();c.user.count().then(n=>{console.log(n);c.\\\$disconnect()}).catch(()=>{console.log(0)})\"" 2>/dev/null | tail -1)
            echo "Users in database: $HAS_DATA"
            if [ "${HAS_DATA:-0}" = "0" ] || [ "${FORCE_SEED}" = "true" ]; then
              echo "Starting database seed..."
              docker compose exec -T app sh -c "npx ts-node --skipProject --transpile-only --compiler-options '{\"module\":\"CommonJS\",\"moduleResolution\":\"node\",\"esModuleInterop\":true}' prisma/seed.ts 2>&1" || echo "WARNING: Seed exited with code $?"
              echo "Seed completed — restarting app..."
              docker compose restart app
              sleep 10
            else
              echo "Database already has $HAS_DATA users — skipping seed"
            fi

            # Verify env vars are loaded in the container
            echo "=== Verifying container env ==="
            docker compose exec -T app sh -c 'echo "DB_URL set: $([ -n \"$DATABASE_URL\" ] && echo YES || echo NO)"'
            docker compose exec -T app sh -c 'echo "GROQ_KEY set: $([ -n \"$GROQ_API_KEY\" ] && echo YES || echo NO)"'
            docker compose exec -T app sh -c 'echo "JWT_SECRET set: $([ -n \"$JWT_SECRET\" ] && echo YES || echo NO)"'

            # Quick login test
            echo "=== Login smoke test ==="
            LOGIN_RESULT=$(curl -s http://localhost:3000/api/auth/login -X POST -H 'Content-Type: application/json' -d '{"email":"sarah.johnson@mediwyz.com","password":"Doctor123!"}')
            echo "Login result: $LOGIN_RESULT"

            # Clean up old images
            docker image prune -f 2>/dev/null || true

            echo "Deployment complete with seed data"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          APP_URL: ${{ secrets.APP_DOMAIN != '' && format('https://{0}', secrets.APP_DOMAIN) || secrets.VULTR_DOMAIN != '' && format('https://{0}', secrets.VULTR_DOMAIN) || format('http://{0}', secrets.VPS_HOST) }}
          DB_URL: ${{ secrets.DATABASE_URL || format('postgresql://healthwyz:{0}@db:5432/healthwyz', secrets.POSTGRES_PASSWORD) }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          SUPER_ADMIN_FIRST_NAME: ${{ secrets.SUPER_ADMIN_FIRST_NAME }}
          SUPER_ADMIN_LAST_NAME: ${{ secrets.SUPER_ADMIN_LAST_NAME }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}

      - name: Setup HTTPS with Let's Encrypt
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          envs: VULTR_DOMAIN,DEPLOY_DIR
          script: |
            if [ -z "$VULTR_DOMAIN" ]; then
              echo "No VULTR_DOMAIN set, skipping HTTPS setup"
              exit 0
            fi

            if [ -f "/etc/letsencrypt/live/$VULTR_DOMAIN/fullchain.pem" ]; then
              echo "Certificate already exists for $VULTR_DOMAIN"
              exit 0
            fi

            echo "Setting up Let's Encrypt for $VULTR_DOMAIN..."

            if ! which certbot > /dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq certbot python3-certbot-nginx
            fi

            # Try both old and new nginx site config names
            NGINX_SITE=""
            for name in healthwyz omd mediwyz default; do
              if [ -f "/etc/nginx/sites-enabled/$name" ]; then
                NGINX_SITE="$name"
                break
              fi
            done
            if [ -n "$NGINX_SITE" ]; then
              sudo sed -i "s/server_name .*;/server_name $VULTR_DOMAIN;/g" /etc/nginx/sites-enabled/$NGINX_SITE
            fi
            sudo nginx -t && sudo systemctl reload nginx

            sudo certbot --nginx -d "$VULTR_DOMAIN" --non-interactive --agree-tos --email admin@mediwyz.com --redirect

            echo "HTTPS certificate installed for $VULTR_DOMAIN"
        env:
          VULTR_DOMAIN: ${{ secrets.VULTR_DOMAIN }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: VULTR_DOMAIN
          script: |
            DOMAIN="${VULTR_DOMAIN:-localhost}"
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "(mediwyz|omd|healthwyz)"

            echo ""
            echo "=== Health Check ==="
            if curl -sk "https://$DOMAIN/api/auth/me" 2>/dev/null; then
              echo "App responding on HTTPS"
            elif curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "App responding on HTTP"
            else
              echo "WARNING: App not responding"
            fi

            echo ""
            echo "=== Memory Usage ==="
            free -h | head -2

            echo ""
            echo "=== Disk Usage ==="
            df -h / | tail -1
        env:
          VULTR_DOMAIN: ${{ secrets.VULTR_DOMAIN }}
