name: Fix VPS — Grant sudo + Open 443 + Provision SSL

on:
  workflow_dispatch:

jobs:
  fix:
    name: Fix VPS permissions and provision SSL
    runs-on: [self-hosted, mediwyz]
    steps:
      - name: Grant runner passwordless sudo via Docker
        run: |
          # The runner is in the docker group so it can run docker commands.
          # We mount /etc from the host inside an alpine container to write
          # the sudoers file — no existing sudo needed.
          RUNNER_USER="$(whoami)"
          echo "Runner is running as: $RUNNER_USER"

          docker run --rm \
            -v /etc:/host-etc \
            -v /usr/sbin:/host-usrsbin \
            alpine sh -c "
              echo '${RUNNER_USER} ALL=(ALL) NOPASSWD: ALL' > /host-etc/sudoers.d/runner-nopasswd
              chmod 440 /host-etc/sudoers.d/runner-nopasswd
              echo 'Sudoers entry written for ${RUNNER_USER}'
            "

      - name: Verify sudo works
        run: sudo id

      - name: Open port 443 in UFW
        run: |
          sudo ufw allow 443/tcp || true
          sudo ufw allow 'Nginx Full' || true
          sudo ufw --force enable || true
          sudo ufw status

      - name: Stop host nginx if running (to free ports)
        run: sudo systemctl stop nginx 2>/dev/null || true

      - name: Install certbot if missing
        run: |
          if ! command -v certbot >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y certbot python3-certbot-nginx
          fi
          certbot --version

      - name: Provision SSL cert (standalone mode)
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        timeout-minutes: 3
        run: |
          # Stop nginx so certbot standalone can bind to port 80
          sudo systemctl stop nginx 2>/dev/null || true

          echo "=== Running certbot standalone for $APP_DOMAIN ==="
          sudo certbot certonly --standalone \
            -d "$APP_DOMAIN" -d "www.$APP_DOMAIN" \
            --non-interactive --agree-tos \
            -m "$ADMIN_EMAIL" \
            --preferred-challenges http \
            2>&1 && echo "CERT_OK" || echo "CERT_FAILED"

      - name: Configure nginx with SSL
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: |
          DEPLOY_DIR="${{ secrets.DEPLOY_DIR || 'mediwyz' }}"
          DOMAIN="$APP_DOMAIN"
          CERT_DIR="/etc/letsencrypt/live/$DOMAIN"

          echo "=== Writing nginx config ==="
          sudo tee /etc/nginx/sites-available/mediwyz > /dev/null << NGINXEOF
          server {
              listen 80;
              listen [::]:80;
              server_name ${DOMAIN} www.${DOMAIN};
              return 301 https://\$host\$request_uri;
          }

          server {
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name ${DOMAIN} www.${DOMAIN};

              ssl_certificate     ${CERT_DIR}/fullchain.pem;
              ssl_certificate_key ${CERT_DIR}/privkey.pem;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         HIGH:!aNULL:!MD5;

              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache_bypass \$http_upgrade;
                  client_max_body_size 50M;
              }

              location /socket.io/ {
                  proxy_pass http://localhost:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection upgrade;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
              }
          }
          NGINXEOF

          sudo sed -i 's/^[[:space:]]*//' /etc/nginx/sites-available/mediwyz
          sudo ln -sf /etc/nginx/sites-available/mediwyz /etc/nginx/sites-enabled/mediwyz
          sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

          sudo nginx -t && sudo systemctl start nginx && echo "nginx started with HTTPS"

      - name: Verify HTTPS
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          sleep 5
          curl -sI https://$APP_DOMAIN | head -5 && echo "HTTPS is live!" || echo "HTTPS not responding yet"
