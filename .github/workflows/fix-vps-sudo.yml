name: Fix VPS — Grant sudo + Open 443 + Provision SSL

on:
  workflow_dispatch:

jobs:
  fix:
    name: Fix VPS permissions and provision SSL
    runs-on: [self-hosted, mediwyz]
    steps:
      - name: Grant runner passwordless sudo via Docker
        run: |
          # The runner is in the docker group so it can run docker commands.
          # We mount /etc from the host inside an alpine container to write
          # the sudoers file — no existing sudo needed.
          RUNNER_USER="$(whoami)"
          echo "Runner is running as: $RUNNER_USER"

          docker run --rm \
            -v /etc:/host-etc \
            -v /usr/sbin:/host-usrsbin \
            alpine sh -c "
              echo '${RUNNER_USER} ALL=(ALL) NOPASSWD: ALL' > /host-etc/sudoers.d/runner-nopasswd
              chmod 440 /host-etc/sudoers.d/runner-nopasswd
              echo 'Sudoers entry written for ${RUNNER_USER}'
            "

      - name: Verify sudo works
        run: sudo id

      - name: Open port 443 in UFW
        run: |
          sudo ufw allow 443/tcp || true
          sudo ufw allow 'Nginx Full' || true
          sudo ufw --force enable || true
          sudo ufw status

      - name: Stop host nginx if running (to free ports)
        run: sudo systemctl stop nginx 2>/dev/null || true

      - name: Install certbot if missing
        run: |
          if ! command -v certbot >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y certbot python3-certbot-nginx
          fi
          certbot --version

      - name: List existing certs on VPS
        run: |
          echo "=== Certs in /etc/letsencrypt/live/ ==="
          sudo ls -la /etc/letsencrypt/live/ 2>/dev/null || echo "No certs directory found"
          echo ""
          echo "=== certbot certificates ==="
          sudo certbot certificates 2>/dev/null || echo "certbot not installed yet"

      - name: Configure nginx + HTTPS (inline — no script file)
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
        timeout-minutes: 5
        run: |
          DOMAIN="$APP_DOMAIN"
          echo "Domain: $DOMAIN"

          # Pull latest code so VPS scripts are up-to-date going forward
          DEPLOY_DIR="${{ secrets.DEPLOY_DIR || 'mediwyz' }}"
          git -C /root/$DEPLOY_DIR pull origin main 2>/dev/null || true

          # Find existing cert — handles mediwyz.com OR mediwyz.com-0001 suffixes
          CERT_DIR=$(ls -d /etc/letsencrypt/live/${DOMAIN}* 2>/dev/null | head -1 || true)
          HAS_CERT=0
          if [ -n "$CERT_DIR" ] && [ -f "$CERT_DIR/fullchain.pem" ]; then
            HAS_CERT=1
            echo "Found cert at: $CERT_DIR (valid)"
          else
            echo "No cert found — will attempt to obtain one"
          fi

          # Start nginx with HTTP-only config first (needed for webroot challenge)
          sudo tee /etc/nginx/sites-available/mediwyz > /dev/null << NGINXEOF
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        client_max_body_size 50M;
    }
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host \$host;
    }
}
NGINXEOF
          sudo ln -sf /etc/nginx/sites-available/mediwyz /etc/nginx/sites-enabled/mediwyz
          sudo rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
          sudo systemctl start nginx 2>/dev/null || sudo systemctl reload nginx
          echo "nginx running (HTTP)"

          # Obtain cert if missing
          if [ "$HAS_CERT" = "0" ]; then
            echo "Requesting cert via webroot..."
            sudo mkdir -p /var/www/html/.well-known/acme-challenge
            sudo certbot certonly --webroot -w /var/www/html \
              -d "$DOMAIN" -d "www.$DOMAIN" \
              --non-interactive --agree-tos -m "$ADMIN_EMAIL" && {
              CERT_DIR=$(ls -d /etc/letsencrypt/live/${DOMAIN}* 2>/dev/null | head -1 || true)
              [ -n "$CERT_DIR" ] && [ -f "$CERT_DIR/fullchain.pem" ] && HAS_CERT=1
            } || echo "WARNING: certbot failed"
          fi

          # Write HTTPS config if cert is available
          if [ "$HAS_CERT" = "1" ] && [ -n "$CERT_DIR" ]; then
            echo "Writing HTTPS nginx config using cert: $CERT_DIR"
            sudo tee /etc/nginx/sites-available/mediwyz > /dev/null << HTTPSEOF
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};
    return 301 https://\$host\$request_uri;
}
server {
    listen 443 ssl;
    server_name ${DOMAIN} www.${DOMAIN};
    ssl_certificate     ${CERT_DIR}/fullchain.pem;
    ssl_certificate_key ${CERT_DIR}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        client_max_body_size 50M;
    }
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host \$host;
    }
}
HTTPSEOF
            sudo nginx -t && sudo systemctl reload nginx && echo "nginx reloaded with HTTPS"
          else
            echo "No cert — running HTTP only"
          fi

      - name: Verify HTTPS
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          sleep 5
          echo "=== HTTP response ==="
          curl -sI http://$APP_DOMAIN | head -3
          echo "=== HTTPS response ==="
          curl -sI https://$APP_DOMAIN | head -3 && echo "HTTPS is live!" || echo "HTTPS not yet responding"
