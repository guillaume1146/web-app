name: Mobile — Flutter Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile/lib/**'
      - 'mobile/pubspec.yaml'
      - 'mobile/pubspec.lock'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/lib/**'
      - 'mobile/pubspec.yaml'
  workflow_dispatch:

jobs:
  # ─── Android APK ─────────────────────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android platform files
        run: flutter create --platforms=android --org=com.mediwyz --project-name=mediwyz_mobile .

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=API_BASE=https://mediwyz.com/api \
            --dart-define=SOCKET_URL=https://mediwyz.com

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediwyz-android-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ─── iOS (macOS runner) ──────────────────────────────────────────────────
  ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate iOS platform files
        run: flutter create --platforms=ios --org=com.mediwyz --project-name=mediwyz_mobile .

      - name: Apply custom Info.plist permissions
        run: |
          cat > ios/Runner/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>$(DEVELOPMENT_LANGUAGE)</string>
            <key>CFBundleDisplayName</key><string>MediWyz</string>
            <key>CFBundleExecutable</key><string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key><string>com.mediwyz.mobile</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>mediwyz_mobile</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$(FLUTTER_BUILD_NAME)</string>
            <key>CFBundleSignature</key><string>????</string>
            <key>CFBundleVersion</key><string>$(FLUTTER_BUILD_NUMBER)</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
            <key>UIMainStoryboardFile</key><string>Main</string>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UIViewControllerBasedStatusBarAppearance</key><false/>
            <key>NSCameraUsageDescription</key><string>MediWyz needs camera access for video consultations with your healthcare provider.</string>
            <key>NSMicrophoneUsageDescription</key><string>MediWyz needs microphone access for video and audio consultations.</string>
            <key>NSPhotoLibraryUsageDescription</key><string>MediWyz needs photo library access to upload profile photos and documents.</string>
            <key>NSPhotoLibraryAddUsageDescription</key><string>MediWyz needs permission to save images to your photo library.</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsLocalNetworking</key><true/>
            </dict>
            <key>UIBackgroundModes</key>
            <array>
              <string>audio</string>
              <string>fetch</string>
              <string>remote-notification</string>
              <string>voip</string>
            </array>
          </dict>
          </plist>
          PLIST

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no-codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE=https://mediwyz.com/api \
            --dart-define=SOCKET_URL=https://mediwyz.com

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediwyz-ios-release
          path: mobile/build/ios/iphoneos/Runner.app
          retention-days: 14
